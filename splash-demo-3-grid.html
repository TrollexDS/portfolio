<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio 2026 — Splash Demo 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f0;
    color: #111;
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  .splash {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 24px;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 24px;
    border-bottom: 1px solid #e0e0dc;
    opacity: 0;
    animation: fadeDown 0.6s ease 0.3s forwards;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #111;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  .top-right {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #999;
    letter-spacing: 0.05em;
  }

  /* Center grid */
  .grid-area {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: min(560px, 85vw);
    aspect-ratio: 2 / 1;
  }

  .tile {
    background: #eaeae5;
    border-radius: 6px;
    opacity: 0;
    transform: scale(0.8);
    animation: tileIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    position: relative;
    overflow: hidden;
  }

  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.5) 100%);
  }

  .tile:nth-child(1)  { animation-delay: 0.4s; background: #111; }
  .tile:nth-child(2)  { animation-delay: 0.5s; background: #e8dff5; }
  .tile:nth-child(3)  { animation-delay: 0.6s; background: #d4e7ed; grid-column: span 2; }
  .tile:nth-child(4)  { animation-delay: 0.7s; background: #f5e6d0; grid-column: span 2; }
  .tile:nth-child(5)  { animation-delay: 0.8s; background: #dde8d5; }
  .tile:nth-child(6)  { animation-delay: 0.9s; background: #f0dde0; }

  @keyframes tileIn {
    to { opacity: 1; transform: scale(1); }
  }

  /* Shimmer effect on tiles */
  .tile::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    animation: shimmer 2.5s ease-in-out infinite;
    animation-delay: inherit;
    z-index: 1;
  }

  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 200%; }
  }

  /* Overlay text */
  .overlay-text {
    position: absolute;
    text-align: center;
    z-index: 2;
  }

  .overlay-text h1 {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    opacity: 0;
    animation: scaleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
    mix-blend-mode: difference;
    color: #fff;
  }

  .overlay-text .year-tag {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 16px;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #666;
    opacity: 0;
    animation: riseIn 0.6s ease 1.6s forwards;
    background: rgba(245,245,240,0.85);
    backdrop-filter: blur(4px);
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
    border-top: 1px solid #e0e0dc;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.8s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #999;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .counter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #999;
  }

  .counter .num {
    display: inline-block;
    min-width: 2ch;
    text-align: right;
    animation: countUp 3s steps(100) 2s forwards;
  }

  @keyframes countUp {
    from { content: '0'; }
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="top-bar">
      <div class="logo"><span></span>Studio</div>
      <div class="top-right">FOLIO — 001</div>
    </div>

    <div class="grid-area">
      <div class="tile-grid">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
      </div>
      <div class="overlay-text">
        <h1>PORTFOLIO</h1>
        <div class="year-tag">2026 Edition</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="status">
        <div class="status-dot"></div>
        Loading assets
      </div>
      <div class="counter"><span class="num" id="counter">0</span>%</div>
    </div>
  </div>

  <script>
    const counter = document.getElementById('counter');
    let val = 0;
    const target = 100;
    const duration = 3000;
    const start = performance.now();

    function easeOutQuart(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function update(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      val = Math.round(easeOutQuart(progress) * target);
      counter.textContent = val;
      if (progress < 1) requestAnimationFrame(update);
    }

    setTimeout(() => requestAnimationFrame(update), 2000);
  </script>
</body>
</html>
