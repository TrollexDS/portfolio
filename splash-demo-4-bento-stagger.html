<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio 2026 — Bento Stagger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f7f7f5;
    color: #111;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .bento {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    width: min(900px, 92vw);
    height: min(600px, 80vh);
  }

  .cell {
    border-radius: 16px;
    opacity: 0;
    transform: translateY(30px) scale(0.95);
    animation: cellIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    position: relative;
    overflow: hidden;
  }

  /* Stagger delays */
  .cell:nth-child(1)  { animation-delay: 0.1s; }
  .cell:nth-child(2)  { animation-delay: 0.2s; }
  .cell:nth-child(3)  { animation-delay: 0.15s; }
  .cell:nth-child(4)  { animation-delay: 0.3s; }
  .cell:nth-child(5)  { animation-delay: 0.25s; }
  .cell:nth-child(6)  { animation-delay: 0.35s; }
  .cell:nth-child(7)  { animation-delay: 0.4s; }
  .cell:nth-child(8)  { animation-delay: 0.45s; }

  @keyframes cellIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ---- Hero cell ---- */
  .cell--hero {
    grid-column: 1 / 3;
    grid-row: 1 / 3;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 32px;
  }

  .cell--hero h1 {
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.05;
    opacity: 0;
    animation: textUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
  }

  .cell--hero .sub {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: textUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
  }

  @keyframes textUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Gradient accent ---- */
  .cell--gradient {
    grid-column: 3 / 4;
    grid-row: 1 / 2;
    background: linear-gradient(145deg, #e8d5f5, #d5c8f8, #c5d5fa);
    background-size: 200% 200%;
    animation: cellIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards,
               gradientShift 6s ease infinite 1s;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .cell--gradient .label {
    position: absolute;
    bottom: 16px;
    left: 16px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.4);
  }

  /* ---- Stats cell ---- */
  .cell--stats {
    grid-column: 4 / 5;
    grid-row: 1 / 2;
    background: #fff;
    border: 1px solid #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .cell--stats .big-num {
    font-size: clamp(28px, 3vw, 44px);
    font-weight: 700;
    letter-spacing: -0.03em;
    opacity: 0;
    animation: textUp 0.6s ease 1.2s forwards;
  }

  .cell--stats .stat-label {
    font-size: 11px;
    color: #999;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0;
    animation: textUp 0.6s ease 1.4s forwards;
  }

  /* ---- Warm cell ---- */
  .cell--warm {
    grid-column: 3 / 5;
    grid-row: 2 / 3;
    background: #fef3e2;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .cell--warm .orbit {
    width: 80px;
    height: 80px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 50%;
    position: relative;
    animation: spinSlow 10s linear infinite;
  }

  .cell--warm .orbit::before {
    content: '';
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    background: #f59e0b;
    border-radius: 50%;
  }

  .cell--warm .orbit-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 40px;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 50%;
    animation: spinSlow 6s linear infinite reverse;
  }

  .cell--warm .orbit-inner::before {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: #fb923c;
    border-radius: 50%;
  }

  @keyframes spinSlow {
    to { transform: rotate(360deg); }
  }
  .cell--warm .orbit-inner {
    animation-name: spinSlowR;
  }
  @keyframes spinSlowR {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(-360deg); }
  }

  .cell--warm .tag {
    position: absolute;
    bottom: 14px;
    right: 16px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.25);
  }

  /* ---- Bottom row ---- */
  .cell--bottom-wide {
    grid-column: 1 / 3;
    grid-row: 3 / 4;
    background: #fff;
    border: 1px solid #eee;
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 20px;
  }

  .progress-ring {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }

  .progress-ring circle {
    fill: none;
    stroke-width: 3;
  }

  .progress-ring .bg { stroke: #f0f0ee; }

  .progress-ring .fill {
    stroke: #111;
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    animation: ringFill 2.5s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
  }

  @keyframes ringFill {
    to { stroke-dashoffset: 0; }
  }

  .loading-text {
    font-size: 13px;
    color: #888;
    opacity: 0;
    animation: textUp 0.5s ease 1.6s forwards;
  }

  .loading-text strong {
    color: #111;
    font-weight: 600;
  }

  /* ---- Mint cell ---- */
  .cell--mint {
    grid-column: 3 / 4;
    grid-row: 3 / 4;
    background: #e4f5ec;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cell--mint .bars {
    display: flex;
    gap: 4px;
    align-items: flex-end;
    height: 48px;
  }

  .cell--mint .bar {
    width: 8px;
    border-radius: 4px;
    background: #34d399;
    opacity: 0.5;
    animation: barGrow 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .bar:nth-child(1) { height: 20px; animation-delay: 1.3s; }
  .bar:nth-child(2) { height: 32px; animation-delay: 1.4s; }
  .bar:nth-child(3) { height: 24px; animation-delay: 1.5s; }
  .bar:nth-child(4) { height: 40px; animation-delay: 1.6s; }
  .bar:nth-child(5) { height: 28px; animation-delay: 1.7s; }

  @keyframes barGrow {
    from { transform: scaleY(0); opacity: 0; }
    to { transform: scaleY(1); opacity: 0.7; }
  }

  /* ---- Year cell ---- */
  .cell--year {
    grid-column: 4 / 5;
    grid-row: 3 / 4;
    background: #111;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(20px, 2.5vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    position: relative;
  }

  .cell--year span {
    opacity: 0;
    animation: textUp 0.6s ease 1.8s forwards;
  }

  .cell--year::before {
    content: '';
    position: absolute;
    top: 12px;
    right: 12px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="bento">
    <!-- Hero -->
    <div class="cell cell--hero">
      <h1>Design<br>Portfolio</h1>
      <p class="sub">Selected works &amp; case studies</p>
    </div>

    <!-- Gradient -->
    <div class="cell cell--gradient">
      <span class="label">Visual</span>
    </div>

    <!-- Stats -->
    <div class="cell cell--stats">
      <span class="big-num">24</span>
      <span class="stat-label">Projects</span>
    </div>

    <!-- Warm orbit -->
    <div class="cell cell--warm">
      <div class="orbit">
        <div class="orbit-inner"></div>
      </div>
      <span class="tag">Loading</span>
    </div>

    <!-- Bottom wide -->
    <div class="cell cell--bottom-wide">
      <svg class="progress-ring" viewBox="0 0 44 44">
        <circle class="bg" cx="22" cy="22" r="20"/>
        <circle class="fill" cx="22" cy="22" r="20"/>
      </svg>
      <div class="loading-text"><strong>Preparing your experience</strong><br>Assembling bento layout&hellip;</div>
    </div>

    <!-- Mint bars -->
    <div class="cell cell--mint">
      <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>

    <!-- Year -->
    <div class="cell cell--year">
      <span>'26</span>
    </div>
  </div>
</body>
</html>
