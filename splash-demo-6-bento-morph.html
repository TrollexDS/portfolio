<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio 2026 — Bento Morph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    color: #0a0a0a;
    font-family: 'Sora', sans-serif;
    height: 100vh;
    overflow: hidden;
    padding: 20px;
  }

  .container {
    height: 100%;
    display: grid;
    grid-template-rows: 48px 1fr 48px;
    gap: 14px;
  }

  /* ---- Top nav ---- */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: drop 0.5s ease 0.2s forwards;
  }

  @keyframes drop {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nav-logo {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.04em;
  }

  .nav-logo .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    border-radius: 50%;
    margin-left: 2px;
    vertical-align: super;
    font-size: 0;
  }

  .nav-links {
    display: flex;
    gap: 24px;
    font-size: 13px;
    font-weight: 400;
    color: #aaa;
  }

  .nav-links span:first-child { color: #0a0a0a; font-weight: 500; }

  /* ---- Bento ---- */
  .bento {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    grid-template-rows: 1.2fr 0.8fr 1fr;
    gap: 10px;
    min-height: 0;
  }

  .b {
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    opacity: 0;
  }

  /* Stagger from center outwards */
  .b1 { animation: morphIn 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) 0.3s forwards; }
  .b2 { animation: morphIn 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) 0.45s forwards; }
  .b3 { animation: morphIn 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) 0.5s forwards; }
  .b4 { animation: morphIn 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) 0.55s forwards; }
  .b5 { animation: morphIn 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) 0.6s forwards; }
  .b6 { animation: morphIn 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) 0.65s forwards; }
  .b7 { animation: morphIn 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) 0.7s forwards; }

  @keyframes morphIn {
    0% { opacity: 0; border-radius: 40px; transform: scale(0.85); }
    100% { opacity: 1; border-radius: 16px; transform: scale(1); }
  }

  /* ---- Cell 1: Hero ---- */
  .b1 {
    grid-row: 1 / 3;
    background: #0a0a0a;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px;
  }

  .b1 .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    opacity: 0;
    animation: fadeUp 0.6s ease 1s forwards;
  }

  .b1 h1 {
    font-size: clamp(28px, 3.8vw, 52px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.05;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.1s forwards;
  }

  .b1 h1 em {
    font-style: italic;
    font-weight: 300;
    opacity: 0.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Animated gradient line */
  .gradient-line {
    height: 3px;
    border-radius: 3px;
    background: linear-gradient(90deg, #818cf8, #c084fc, #f472b6, #fb923c, #818cf8);
    background-size: 300% 100%;
    animation: gradientScroll 3s linear infinite;
    margin-top: 16px;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.4s forwards, gradientScroll 3s linear 1.4s infinite;
  }

  @keyframes gradientScroll {
    to { background-position: -300% 0; }
  }

  /* ---- Cell 2: Floating shapes ---- */
  .b2 {
    background: #f8f7ff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .morph-shape {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
    animation: morphBlob 8s ease-in-out infinite;
    opacity: 0.7;
  }

  @keyframes morphBlob {
    0%   { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(0deg); }
    25%  { border-radius: 58% 42% 36% 64% / 56% 65% 35% 44%; }
    50%  { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; transform: rotate(180deg); }
    75%  { border-radius: 33% 67% 58% 42% / 63% 38% 62% 37%; }
    100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(360deg); }
  }

  /* ---- Cell 3: Discipline tags ---- */
  .b3 {
    background: #fefce8;
    display: flex;
    flex-wrap: wrap;
    align-content: center;
    justify-content: center;
    gap: 6px;
    padding: 16px;
  }

  .disc-tag {
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid rgba(0,0,0,0.08);
    font-size: 11px;
    font-weight: 500;
    color: #555;
    opacity: 0;
    animation: tagPop 0.4s ease forwards;
    background: rgba(255,255,255,0.6);
  }

  .disc-tag:nth-child(1) { animation-delay: 1.0s; }
  .disc-tag:nth-child(2) { animation-delay: 1.1s; }
  .disc-tag:nth-child(3) { animation-delay: 1.2s; }
  .disc-tag:nth-child(4) { animation-delay: 1.3s; }
  .disc-tag:nth-child(5) { animation-delay: 1.4s; }
  .disc-tag:nth-child(6) { animation-delay: 1.5s; }

  @keyframes tagPop {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  /* ---- Cell 4: Number reveal ---- */
  .b4 {
    background: #f0fdf4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .b4 .num {
    font-size: clamp(36px, 4vw, 56px);
    font-weight: 700;
    letter-spacing: -0.04em;
    color: #16a34a;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.2s forwards;
  }

  .b4 .num-label {
    font-size: 11px;
    color: #86efac;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.4s forwards;
  }

  /* ---- Cell 5: Wave ---- */
  .b5 {
    background: #fff5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  .wave-bar {
    width: 4px;
    height: 24px;
    background: #f87171;
    border-radius: 4px;
    animation: waveAnim 1.2s ease-in-out infinite;
    opacity: 0.6;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; height: 16px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 28px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 20px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 36px; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 24px; }
  .wave-bar:nth-child(6) { animation-delay: 0.5s; height: 32px; }
  .wave-bar:nth-child(7) { animation-delay: 0.6s; height: 18px; }

  @keyframes waveAnim {
    0%, 100% { transform: scaleY(0.6); }
    50% { transform: scaleY(1.2); }
  }

  /* ---- Cell 6: Bottom wide ---- */
  .b6 {
    grid-column: 2 / 4;
    background: #0a0a0a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
  }

  .b6 .msg {
    font-size: 14px;
    font-weight: 400;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.3s forwards;
  }

  .b6 .msg strong { font-weight: 600; }

  .typing-dots {
    display: flex;
    gap: 5px;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.5s forwards;
  }

  .typing-dots span {
    width: 5px;
    height: 5px;
    background: #555;
    border-radius: 50%;
    animation: typingBounce 1.4s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); background: #555; }
    30% { transform: translateY(-6px); background: #888; }
  }

  /* ---- Cell 7: Year ---- */
  .b7 {
    background: linear-gradient(135deg, #818cf8, #c084fc);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: clamp(24px, 3vw, 40px);
    font-weight: 700;
    letter-spacing: -0.03em;
  }

  .b7 span {
    opacity: 0;
    animation: fadeUp 0.6s ease 1.6s forwards;
  }

  /* ---- Bottom bar ---- */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.8s forwards;
  }

  .footer-left {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #bbb;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-bar .track {
    width: 100px;
    height: 3px;
    background: #eee;
    border-radius: 3px;
    overflow: hidden;
  }

  .status-bar .fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #818cf8, #c084fc);
    border-radius: 3px;
    animation: barFill 3s cubic-bezier(0.4, 0, 0.2, 1) 2s forwards;
  }

  @keyframes barFill {
    0% { width: 0; }
    40% { width: 55%; }
    100% { width: 100%; }
  }

  .status-bar .pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #999;
    min-width: 30px;
    text-align: right;
  }
</style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <div class="nav-logo">studio<span class="dot"></span></div>
      <div class="nav-links">
        <span>Work</span>
        <span>About</span>
        <span>Contact</span>
      </div>
    </nav>

    <div class="bento">
      <!-- Hero -->
      <div class="b b1">
        <span class="eyebrow">Portfolio / 2026</span>
        <div>
          <h1>Crafting<br><em>digital</em><br>experiences</h1>
          <div class="gradient-line"></div>
        </div>
      </div>

      <!-- Morph blob -->
      <div class="b b2">
        <div class="morph-shape"></div>
      </div>

      <!-- Discipline tags -->
      <div class="b b3">
        <span class="disc-tag">UI/UX</span>
        <span class="disc-tag">Branding</span>
        <span class="disc-tag">Motion</span>
        <span class="disc-tag">Product</span>
        <span class="disc-tag">Web</span>
        <span class="disc-tag">3D</span>
      </div>

      <!-- Number -->
      <div class="b b4">
        <span class="num">42</span>
        <span class="num-label">Projects</span>
      </div>

      <!-- Wave -->
      <div class="b b5">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>

      <!-- Bottom message -->
      <div class="b b6">
        <span class="msg"><strong>Almost ready</strong> — loading your experience</span>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Year -->
      <div class="b b7">
        <span>2026</span>
      </div>
    </div>

    <div class="footer">
      <span class="footer-left">v2.0 — built with intention</span>
      <div class="status-bar">
        <div class="track"><div class="fill"></div></div>
        <span class="pct" id="pct">0%</span>
      </div>
    </div>
  </div>

  <script>
    const el = document.getElementById('pct');
    const dur = 3000;
    const start = performance.now();
    function ease(t) { return 1 - Math.pow(1 - t, 3); }
    function tick(now) {
      const p = Math.min((now - start) / dur, 1);
      el.textContent = Math.round(ease(p) * 100) + '%';
      if (p < 1) requestAnimationFrame(tick);
    }
    setTimeout(() => requestAnimationFrame(tick), 2000);
  </script>
</body>
</html>
