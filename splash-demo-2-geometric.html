<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio 2026 — Splash Demo 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    color: #111;
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .splash {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animated shapes */
  .shapes {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
  }

  .shape-1 {
    width: 400px;
    height: 400px;
    top: -80px;
    right: -60px;
    background: linear-gradient(135deg, #f0e6ff 0%, #e8d5f5 100%);
    animation: blobIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards,
               blobFloat 6s ease-in-out 1.7s infinite;
  }

  .shape-2 {
    width: 300px;
    height: 300px;
    bottom: -50px;
    left: -40px;
    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
    animation: blobIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards,
               blobFloat 7s ease-in-out 2s infinite reverse;
  }

  .shape-3 {
    width: 200px;
    height: 200px;
    top: 50%;
    left: 15%;
    background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
    animation: blobIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards,
               blobFloat 5s ease-in-out 2.3s infinite;
  }

  .shape-4 {
    width: 150px;
    height: 150px;
    bottom: 20%;
    right: 15%;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
    animation: blobIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards,
               blobFloat 8s ease-in-out 2.5s infinite reverse;
  }

  @keyframes blobIn {
    from { opacity: 0; transform: scale(0.3); }
    to { opacity: 0.6; transform: scale(1); }
  }

  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(15px, -20px) scale(1.03); }
    66% { transform: translate(-10px, 15px) scale(0.97); }
  }

  /* Center content */
  .center {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  /* Rotating ring */
  .ring-wrap {
    width: 140px;
    height: 140px;
    margin: 0 auto 36px;
    position: relative;
    opacity: 0;
    animation: fadeScale 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
  }

  @keyframes fadeScale {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  .ring {
    width: 100%;
    height: 100%;
    border: 1.5px solid #e0e0e0;
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 2.5s linear infinite;
  }

  .ring-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    border: 1px solid #eee;
    border-bottom-color: #888;
    border-radius: 50%;
    animation: spin 1.8s linear infinite reverse;
  }

  .ring-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    background: #111;
    border-radius: 50%;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .ring-inner { animation: spinInner 1.8s linear infinite; }
  @keyframes spinInner {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(-360deg); }
  }

  /* Title */
  .title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.2;
    opacity: 0;
    transform: translateY(20px);
    animation: riseIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
  }

  .title .highlight {
    background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .tagline {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 300;
    color: #888;
    letter-spacing: 0.06em;
    opacity: 0;
    transform: translateY(15px);
    animation: riseIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards;
  }

  /* Dot loader */
  .dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 40px;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.6s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .dot {
    width: 6px;
    height: 6px;
    background: #ccc;
    border-radius: 50%;
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { background: #ccc; transform: scale(1); }
    40% { background: #111; transform: scale(1.3); }
  }

  /* Bottom nav hint */
  .nav-hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #bbb;
    opacity: 0;
    animation: fadeIn 0.8s ease 2s forwards;
  }

  .nav-hint .arrow {
    width: 16px;
    height: 16px;
    border: 1px solid #ccc;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: bounce 1.5s ease infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      <div class="shape shape-4"></div>
    </div>

    <div class="center">
      <div class="ring-wrap">
        <div class="ring"></div>
        <div class="ring-inner"></div>
        <div class="ring-dot"></div>
      </div>
      <h1 class="title">Creative <span class="highlight">Portfolio</span></h1>
      <p class="tagline">Curating experiences since 2026</p>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="nav-hint">
    <span class="arrow">&#8595;</span>
    Scroll to explore
  </div>
</body>
</html>
