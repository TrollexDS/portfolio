<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio 2026 — Splash Demo 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #FAFAF8;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .splash {
    text-align: center;
    position: relative;
  }

  /* Top rule */
  .rule {
    width: 0;
    height: 1px;
    background: #1a1a1a;
    margin: 0 auto 40px;
    animation: expandRule 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
  }

  @keyframes expandRule {
    to { width: 120px; }
  }

  /* Name */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 80px);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
    overflow: hidden;
  }

  .name span {
    display: inline-block;
    transform: translateY(110%);
    animation: slideUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .name .first { animation-delay: 0.5s; }
  .name .amp {
    font-style: italic;
    font-weight: 400;
    opacity: 0.4;
    animation-delay: 0.65s;
  }
  .name .last { animation-delay: 0.8s; }

  @keyframes slideUp {
    to { transform: translateY(0); }
  }

  /* Subtitle */
  .subtitle {
    margin-top: 20px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #999;
    opacity: 0;
    animation: fadeIn 1s ease 1.4s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Year badge */
  .year {
    position: fixed;
    bottom: 40px;
    right: 40px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: #bbb;
    opacity: 0;
    animation: fadeIn 1s ease 1.8s forwards;
  }

  /* Progress bar */
  .progress-wrap {
    margin-top: 48px;
    opacity: 0;
    animation: fadeIn 0.6s ease 1.6s forwards;
  }

  .progress-bar {
    width: 200px;
    height: 2px;
    background: #e8e8e6;
    margin: 0 auto;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0;
    background: #1a1a1a;
    border-radius: 2px;
    animation: fillBar 2.5s cubic-bezier(0.4, 0, 0.2, 1) 2s forwards;
  }

  @keyframes fillBar {
    0% { width: 0; }
    30% { width: 45%; }
    60% { width: 70%; }
    100% { width: 100%; }
  }

  .progress-label {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #bbb;
  }

  /* Corner marks */
  .corner {
    position: fixed;
    width: 20px;
    height: 20px;
    opacity: 0;
    animation: fadeIn 1s ease 1s forwards;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: #ddd;
  }
  .corner::before { width: 1px; height: 20px; }
  .corner::after { width: 20px; height: 1px; }
  .corner.tl { top: 30px; left: 30px; }
  .corner.tr { top: 30px; right: 30px; }
  .corner.tr::before { right: 0; }
  .corner.tr::after { right: 0; }
  .corner.bl { bottom: 30px; left: 30px; }
  .corner.bl::before { bottom: 0; }
  .corner.bl::after { bottom: 0; }
  .corner.br { bottom: 30px; right: 30px; }
  .corner.br::before { right: 0; bottom: 0; }
  .corner.br::after { right: 0; bottom: 0; }
</style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="splash">
    <div class="rule"></div>
    <h1 class="name">
      <span class="first">Design</span><br>
      <span class="amp">&amp;</span>
      <span class="last">Portfolio</span>
    </h1>
    <p class="subtitle">Selected Works &bull; Visual Design &bull; Branding</p>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <p class="progress-label">Loading experience</p>
    </div>
  </div>

  <span class="year">&copy; 2026</span>
</body>
</html>
