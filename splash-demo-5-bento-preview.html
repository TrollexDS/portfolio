<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio 2026 — Bento Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --bg: #fafaf8;
    --card: #fff;
  }

  body {
    background: var(--bg);
    color: #111;
    font-family: 'Outfit', sans-serif;
    height: 100vh;
    overflow: hidden;
    padding: 16px;
  }

  .splash {
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 16px;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.2s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 32px;
    height: 32px;
    background: #111;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-icon svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
  }

  .brand-name {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 100px;
    background: #f0f0ec;
    font-size: 12px;
    font-weight: 500;
    color: #666;
  }

  .pill--active {
    background: #111;
    color: #fff;
  }

  /* ---- Bento grid ---- */
  .bento {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 10px;
    min-height: 0;
  }

  .card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid #ececea;
    overflow: hidden;
    position: relative;
    opacity: 0;
    transform: translateY(24px);
    animation: cardIn 0.65s var(--ease) forwards;
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Thumbnail shimmer */
  .thumb {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  .thumb-bg {
    position: absolute;
    inset: 0;
    opacity: 0;
    animation: thumbReveal 1s var(--ease) forwards;
  }

  @keyframes thumbReveal {
    from { opacity: 0; transform: scale(1.1); }
    to { opacity: 1; transform: scale(1); }
  }

  .thumb::after {
    content: '';
    position: absolute;
    top: 0;
    left: -120%;
    width: 80%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: sweepShimmer 2s ease 0.5s infinite;
  }

  @keyframes sweepShimmer {
    0% { left: -120%; }
    60%, 100% { left: 120%; }
  }

  /* Card label overlays */
  .card-label {
    position: absolute;
    bottom: 12px;
    left: 14px;
    z-index: 2;
    opacity: 0;
    animation: labelIn 0.5s ease forwards;
  }

  .card-label .tag {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    color: #333;
    letter-spacing: 0.02em;
  }

  @keyframes labelIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Card positions ---- */
  .card-1 {
    grid-column: 1 / 5;
    grid-row: 1 / 4;
    animation-delay: 0.3s;
  }
  .card-1 .thumb-bg {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    animation-delay: 0.9s;
  }
  .card-1 .card-label { animation-delay: 1.5s; }

  .card-2 {
    grid-column: 5 / 8;
    grid-row: 1 / 3;
    animation-delay: 0.4s;
  }
  .card-2 .thumb-bg {
    background: linear-gradient(145deg, #fdf2f8 0%, #fce7f3 50%, #fbcfe8 100%);
    animation-delay: 1s;
  }
  .card-2 .card-label { animation-delay: 1.6s; }

  .card-3 {
    grid-column: 8 / 13;
    grid-row: 1 / 3;
    animation-delay: 0.45s;
  }
  .card-3 .thumb-bg {
    background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #a7f3d0 100%);
    animation-delay: 1.05s;
  }
  .card-3 .card-label { animation-delay: 1.65s; }

  .card-4 {
    grid-column: 5 / 9;
    grid-row: 3 / 5;
    animation-delay: 0.5s;
  }
  .card-4 .thumb-bg {
    background: linear-gradient(150deg, #fefce8 0%, #fef3c7 50%, #fde68a 100%);
    animation-delay: 1.1s;
  }
  .card-4 .card-label { animation-delay: 1.7s; }

  .card-5 {
    grid-column: 9 / 13;
    grid-row: 3 / 5;
    animation-delay: 0.55s;
  }
  .card-5 .thumb-bg {
    background: linear-gradient(140deg, #eff6ff 0%, #dbeafe 50%, #bfdbfe 100%);
    animation-delay: 1.15s;
  }
  .card-5 .card-label { animation-delay: 1.75s; }

  /* ---- Title cell ---- */
  .card-title {
    grid-column: 1 / 5;
    grid-row: 4 / 5;
    animation-delay: 0.5s;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 24px;
    border: none;
  }

  .card-title h1 {
    font-size: clamp(18px, 2.2vw, 28px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    opacity: 0;
    animation: labelIn 0.7s ease 1.2s forwards;
  }

  .card-title .year {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    opacity: 0;
    animation: labelIn 0.6s ease 1.5s forwards;
  }

  /* ---- Bottom row ---- */
  .card-6 {
    grid-column: 1 / 7;
    grid-row: 5 / 7;
    animation-delay: 0.6s;
  }
  .card-6 .thumb-bg {
    background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 30%, #ddd6fe 60%, #c4b5fd 100%);
    animation-delay: 1.2s;
  }
  .card-6 .card-label { animation-delay: 1.8s; }

  .card-7 {
    grid-column: 7 / 10;
    grid-row: 5 / 7;
    animation-delay: 0.65s;
  }
  .card-7 .thumb-bg {
    background: linear-gradient(150deg, #fff7ed 0%, #ffedd5 50%, #fed7aa 100%);
    animation-delay: 1.25s;
  }
  .card-7 .card-label { animation-delay: 1.85s; }

  /* ---- Loading cell ---- */
  .card-loader {
    grid-column: 10 / 13;
    grid-row: 5 / 7;
    animation-delay: 0.7s;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    border-style: dashed;
    border-color: #ddd;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #e8e8e5;
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    opacity: 0;
    animation: spin 1s linear infinite, fadeIn 0.5s ease 1.5s forwards;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-label {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.06em;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.7s forwards;
  }

  /* Fake skeleton lines inside some cards */
  .skel-lines {
    position: absolute;
    bottom: 36px;
    left: 14px;
    right: 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    opacity: 0;
    animation: fadeIn 0.6s ease 2s forwards;
  }

  .skel-line {
    height: 4px;
    background: rgba(0,0,0,0.06);
    border-radius: 2px;
  }

  .skel-line:last-child { width: 60%; }
</style>
</head>
<body>
  <div class="splash">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 16 16"><path d="M4 4h8M4 8h5M4 12h8"/></svg>
        </div>
        <span class="brand-name">Portfolio</span>
      </div>
      <div class="header-right">
        <span class="pill pill--active">All</span>
        <span class="pill">Brand</span>
        <span class="pill">Product</span>
        <span class="pill">Web</span>
      </div>
    </div>

    <div class="bento">
      <div class="card card-1">
        <div class="thumb"><div class="thumb-bg"></div></div>
        <div class="card-label"><span class="tag">Brand Identity</span></div>
      </div>

      <div class="card card-2">
        <div class="thumb"><div class="thumb-bg"></div></div>
        <div class="card-label"><span class="tag">App Design</span></div>
      </div>

      <div class="card card-3">
        <div class="thumb"><div class="thumb-bg"></div></div>
        <div class="card-label"><span class="tag">Editorial</span></div>
        <div class="skel-lines">
          <div class="skel-line"></div>
          <div class="skel-line"></div>
          <div class="skel-line"></div>
        </div>
      </div>

      <div class="card card-title">
        <h1>Selected<br>Works '26</h1>
        <span class="year">Design Portfolio</span>
      </div>

      <div class="card card-4">
        <div class="thumb"><div class="thumb-bg"></div></div>
        <div class="card-label"><span class="tag">Motion</span></div>
      </div>

      <div class="card card-5">
        <div class="thumb"><div class="thumb-bg"></div></div>
        <div class="card-label"><span class="tag">Packaging</span></div>
      </div>

      <div class="card card-6">
        <div class="thumb"><div class="thumb-bg"></div></div>
        <div class="card-label"><span class="tag">Product Design</span></div>
      </div>

      <div class="card card-7">
        <div class="thumb"><div class="thumb-bg"></div></div>
        <div class="card-label"><span class="tag">Typography</span></div>
      </div>

      <div class="card card-loader">
        <div class="spinner"></div>
        <span class="loader-label">Loading more</span>
      </div>
    </div>
  </div>
</body>
</html>
